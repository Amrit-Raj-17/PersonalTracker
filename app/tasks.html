<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Tasks</title>

    <link rel="stylesheet"
          href="../css/style.css">

    <script src="../js/auth.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/tasks.js" defer></script>

</head>

<body>

<div id="header"></div>

<main class="tasks-page">

    <div class="page-header">

        <h1>Tasks</h1>

        <button id="createTaskBtn">
            + New Task
        </button>

    </div>

    <div class="task-filters">

        <input
            type="text"
            id="searchTask"
            placeholder="Search task..."
        >

        <select id="priorityFilter">

            <option value="">
                All Priorities
            </option>

            <option value="HIGH">
                High
            </option>

            <option value="MEDIUM">
                Medium
            </option>

            <option value="LOW">
                Low
            </option>

        </select>

        <select id="statusFilter">

            <option value="">
                All Status
            </option>

            <option value="TODO">
                Todo
            </option>

            <option value="IN_PROGRESS">
                In Progress
            </option>

            <option value="COMPLETED">
                Completed
            </option>

        </select>

    </div>

    <div id="tasksContainer">

    </div>

</main>

<!-- Create/Edit Modal -->

<div id="taskModal"
     class="modal hidden">

    <div class="modal-content">

        <h2 id="modalTitle">
            Create Task
        </h2>

        <form id="taskForm">

            <input
                type="hidden"
                id="taskId"
            >

            <input
                type="text"
                id="title"
                placeholder="Task Title"
                required
            >

            <textarea
                id="description"
                placeholder="Description"
                rows="5"
            ></textarea>

            <select id="priority">

                <option value="HIGH">
                    High
                </option>

                <option value="MEDIUM">
                    Medium
                </option>

                <option value="LOW">
                    Low
                </option>

            </select>

            <input
                type="date"
                id="deadline"
            >

            <input
                type="number"
                id="progress"
                min="0"
                max="100"
                value="0"
            >

            <select id="status">

                <option value="TODO">
                    Todo
                </option>

                <option value="IN_PROGRESS">
                    In Progress
                </option>

                <option value="COMPLETED">
                    Completed
                </option>

            </select>

            <button type="submit">
                Save Task
            </button>

            <button
                type="button"
                id="closeModal"
            >
                Cancel
            </button>

        </form>

    </div>

</div>

<div id="footer"></div>

</body>
</html>
