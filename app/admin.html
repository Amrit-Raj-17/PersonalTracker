<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Panel</title>

    <link rel="stylesheet"
          href="../css/style.css">

    <script src="../js/auth.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/admin.js" defer></script>

</head>

<body>

<div id="header"></div>

<main class="admin-page">

    <div class="page-header">

        <h1>
            Admin Dashboard
        </h1>

    </div>

    <section class="admin-stats">

        <div class="stat-card">

            <h3>Total Users</h3>

            <div id="totalUsers">
                0
            </div>

        </div>

        <div class="stat-card">

            <h3>Total Tasks</h3>

            <div id="totalTasks">
                0
            </div>

        </div>

        <div class="stat-card">

            <h3>Total Notes</h3>

            <div id="totalNotes">
                0
            </div>

        </div>

        <div class="stat-card">

            <h3>Active Today</h3>

            <div id="activeUsers">
                0
            </div>

        </div>

    </section>

    <section class="card">

        <div class="section-header">

            <h2>
                Users
            </h2>

            <button id="createUserBtn">
                + User
            </button>

        </div>

        <div id="usersContainer">

        </div>

    </section>

</main>

<!-- User Modal -->

<div
    id="userModal"
    class="modal hidden"
>

    <div class="modal-content">

        <h2>
            Create User
        </h2>

        <form id="userForm">

            <input
                type="text"
                id="userName"
                placeholder="Name"
                required
            >

            <input
                type="email"
                id="userEmail"
                placeholder="Email"
                required
            >

            <input
                type="password"
                id="userPassword"
                placeholder="Password"
                required
            >

            <select id="userRole">

                <option value="USER">
                    USER
                </option>

                <option value="ADMIN">
                    ADMIN
                </option>

            </select>

            <button type="submit">
                Save User
            </button>

            <button
                type="button"
                id="closeUserModal"
            >
                Cancel
            </button>

        </form>

    </div>

</div>

<div id="footer"></div>

</body>

</html>
