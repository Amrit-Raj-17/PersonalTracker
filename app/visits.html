<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Activity Logs</title>

    <link rel="stylesheet"
          href="../css/style.css">

    <script src="../js/auth.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/visits.js" defer></script>

</head>

<body>

<div id="header"></div>

<main class="visits-page">

    <div class="page-header">

        <h1>
            Activity Logs
        </h1>

    </div>

    <div class="filters">

        <input
            type="text"
            id="searchUser"
            placeholder="Search user..."
        >

        <select id="actionFilter">

            <option value="">
                All Actions
            </option>

            <option value="LOGIN">
                LOGIN
            </option>

            <option value="LOGOUT">
                LOGOUT
            </option>

            <option value="OPEN_DASHBOARD">
                OPEN_DASHBOARD
            </option>

            <option value="OPEN_TASKS">
                OPEN_TASKS
            </option>

            <option value="OPEN_DAILY">
                OPEN_DAILY
            </option>

            <option value="OPEN_NOTES">
                OPEN_NOTES
            </option>

            <option value="CREATE_TASK">
                CREATE_TASK
            </option>

            <option value="UPDATE_TASK">
                UPDATE_TASK
            </option>

            <option value="DELETE_TASK">
                DELETE_TASK
            </option>

        </select>

    </div>

    <div id="logsContainer">

    </div>

</main>

<div id="footer"></div>

</body>

</html>
