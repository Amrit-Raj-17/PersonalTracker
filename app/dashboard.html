<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="stylesheet" href="../css/style.css">

    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/dashboard.js" defer></script>
    <script src="../js/common.js" defer></script>
</head>
<body>

<div id="header"></div>

<main class="dashboard-container">

    <section class="hero-card">

        <h1 id="welcomeText">
            Welcome
        </h1>

        <p id="todayDate"></p>

    </section>

    <section class="stats-grid">

        <div class="stat-card">

            <h3>Daily Goals</h3>

            <div id="dailyCompleted">
                0 / 0
            </div>

            <div class="progress-bar">
                <div id="dailyProgressBar"></div>
            </div>

        </div>

        <div class="stat-card">

            <h3>Total Tasks</h3>

            <div id="taskCount">
                0
            </div>

        </div>

        <div class="stat-card">

            <h3>Completed Tasks</h3>

            <div id="completedTasks">
                0
            </div>

        </div>

        <div class="stat-card">

            <h3>Productivity</h3>

            <div id="productivity">
                0%
            </div>

        </div>

    </section>

    <section class="dashboard-grid">

        <div class="card">

            <h2>Pinned Notes</h2>

            <div id="pinnedNotes">

            </div>

        </div>

        <div class="card">

            <h2>My Tasks</h2>

            <div id="dashboardTasks">

            </div>

        </div>

    </section>

    <section class="card">

        <h2>Recent Activity</h2>

        <div id="recentActivity">

        </div>

    </section>

</main>

<div id="footer"></div>

</body>
</html>
